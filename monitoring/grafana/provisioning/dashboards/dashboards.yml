# Load committed dashboard JSON from disk on boot.
apiVersion: 1

providers:
  - name: wafer-deploy
    orgId: 1
    folder: wafer-deploy
    type: file
    disableDeletion: false
    updateIntervalSeconds: 15
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
